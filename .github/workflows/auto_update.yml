name: Daily Stock AI Update & Deploy

on:
  schedule:
    # 每天下午 2 點更新 (Taipei GMT+8 -> UTC 6:00 AM)
    - cron: '0 6 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上隨時手動點擊一鍵觸發

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stock-firebase-app # 關鍵設定：讓所有命令在子目錄中執行

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Stock Updater
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python stock_updater.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Firebase CLI
      run: npm install -g firebase-tools

    - name: Deploy to Firebase Hosting
      run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
